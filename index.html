<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="mainBox">
    <h1>Task Tracker</h1>

    <img src="./images/sort-bottom-grey.svg" alt="sort" class="sort-top-gray">

    <div class="inputBox">
        <input type="text" class="input">
        <img src="./images/delete.svg" alt="delete" class="delete">
    </div>

    <ol class="list"></ol>

    <div class="buttons">
        <button class="plus">+</button>
        <button class="add">Add</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
